<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World - Welcome!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="stars"></div>

    <div class="decor-image decor-image-1"></div>
    <div class="decor-image decor-image-2"></div>
    <div class="decor-image decor-image-3"></div>
    <div class="decor-image decor-image-4"></div>

    <div class="container">
        <div class="card">
            <div class="gradient-circle"></div>
            
            <h1 class="title">Hello World! 👋</h1>
            
            <p class="subtitle">Welcome to My First Demo</p>
            
            <div class="message-box">
                <p id="message">Click the button to see something fun!</p>
            </div>
            
            <div class="button-group">
                <button class="btn btn-primary" id="btn-greet">Greet Me</button>
                <button class="btn btn-secondary" id="btn-colors">Change Colors</button>
                <button class="btn btn-tertiary" id="btn-reset">Reset</button>
            </div>
            
            <div class="feature-list">
                <div class="feature">
                    <span class="icon">🚀</span>
                    <p>Fast & Modern</p>
                </div>
                <div class="feature">
                    <span class="icon">🎨</span>
                    <p>Colorful UI</p>
                </div>
                <div class="feature">
                    <span class="icon">⚡</span>
                    <p>Interactive</p>
                </div>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
